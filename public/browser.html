<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Browser</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            z-index: 1000;
        }
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            margin-right: 15px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <div>Loading browser...</div>
    </div>
    <iframe id="content-frame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>

    <script>
        // Communication with parent window
        window.addEventListener('message', function(event) {
            const { type, url, action, selector, value } = event.data;
            
            const iframe = document.getElementById('content-frame');
            
            if (type === 'navigate') {
                // Navigate to URL
                document.getElementById('loading').style.display = 'flex';
                iframe.setAttribute('sandbox', 'allow-same-origin allow-scripts allow-popups allow-forms allow-modals');
                iframe.src = url;
                iframe.onload = function() {
                    document.getElementById('loading').style.display = 'none';
                    window.parent.postMessage({ type: 'loaded', url: iframe.contentWindow.location.href }, '*');
                };
            }
            else if (type === 'action') {
                try {
                    const iframeWindow = iframe.contentWindow;
                    const iframeDocument = iframe.contentDocument;
                    
                    // Execute actions on the iframe content
                    switch(action) {
                        case 'click':
                            const element = iframeDocument.querySelector(selector);
                            if (element) {
                                element.click();
                                window.parent.postMessage({ 
                                    type: 'action-result', 
                                    action: 'click', 
                                    success: true 
                                }, '*');
                            } else {
                                window.parent.postMessage({ 
                                    type: 'action-result', 
                                    action: 'click', 
                                    success: false,
                                    error: `Element not found: ${selector}`
                                }, '*');
                            }
                            break;
                        case 'fill':
                            const inputElement = iframeDocument.querySelector(selector);
                            if (inputElement) {
                                inputElement.value = value;
                                inputElement.dispatchEvent(new Event('input', { bubbles: true }));
                                window.parent.postMessage({ 
                                    type: 'action-result', 
                                    action: 'fill', 
                                    success: true 
                                }, '*');
                            } else {
                                window.parent.postMessage({ 
                                    type: 'action-result', 
                                    action: 'fill', 
                                    success: false,
                                    error: `Element not found: ${selector}`
                                }, '*');
                            }
                            break;
                    }
                } catch (err) {
                    window.parent.postMessage({ 
                        type: 'action-result', 
                        action: action,
                        success: false,
                        error: err.message
                    }, '*');
                }
            }
        });
    </script>
</body>
</html>
